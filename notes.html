<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync | Task Scheduler</title>
    <link rel="icon" type="image/png" href="Image_Folder/Logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/reminder.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { study: '#2F2E80', sync: '#00B4BE' } } }
        }

        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();

        (async () => {
            const user = await requireLogin();
            
            if (user) {
                // Function to start the dashboard
                const startApp = () => {
                    initNotes(user);
                };

                // If DOM is already loaded, run immediately. Otherwise, wait for it.
                if (document.readyState === "loading") {
                    window.addEventListener('DOMContentLoaded', startApp);
                } else {
                    startApp();
                }
            } else {
                console.error("Auth failed or no user found.");
            }
        })();
    </script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .main-scrollbar::-webkit-scrollbar { width: 4px; }
        .main-scrollbar::-webkit-scrollbar-thumb { background: #00B4BE; border-radius: 10px; }
        #sidebar { transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">

    <!-- TOP NAVBAR (Matching Dashboard) -->
    <header class="h-16 w-full bg-white dark:bg-[#0b1120] border-b border-slate-200 dark:border-white/5 flex items-center justify-between px-6 fixed top-0 z-[60]">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg text-slate-500 hover:text-sync transition">
                <i class="fas fa-bars"></i>
            </button>
            <div class="flex items-center gap-2">
                <img src="Image_Folder/Logo.png" class="h-8 w-auto">
                <span class="font-black text-xl tracking-tighter">
                    <span class="text-[#2F2E80] dark:text-indigo-400">Study</span><span class="text-[#00B4BE]">Sync</span>
                </span>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <!-- NOTIFICATION BELL -->
            <div class="relative">
                <button onclick="toggleReminderDropdown()" class="p-2 w-10 h-10 rounded-full bg-slate-100 dark:bg-white/5 transition flex items-center justify-center relative hover:text-sync">
                    <i class="fas fa-bell text-sm text-slate-400"></i>
                    <!-- Fixed ID: matching the script -->
                    <span id="active-reminder-dot" class="hidden absolute top-2 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white dark:border-[#0b1120]"></span>
                </button>
                
                <!-- DROPDOWN -->
                <div id="reminder-dropdown" class="hidden absolute right-0 mt-3 w-72 bg-white dark:bg-[#0b1120] rounded-[1.5rem] shadow-2xl border border-slate-100 dark:border-white/5 z-[100] overflow-hidden" onclick="event.stopPropagation()">
                    <div class="p-4 border-b dark:border-white/5 bg-slate-50/50 dark:bg-white/5 flex justify-between items-center">
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Upcoming Alerts</h4>
                        
                        <button onclick="toggleReminderSound()" id="sound-toggle-btn" class="text-slate-400 hover:text-sync transition">
                            <i class="fas fa-volume-up text-xs"></i>
                        </button>
                    </div>
                    <div id="reminder-list" class="max-h-80 overflow-y-auto main-scrollbar p-2 space-y-2">
                        <p class="text-center py-8 text-[10px] text-slate-400 italic">No tasks with reminders for today.</p>
                    </div>
                </div>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 w-10 h-10 rounded-full bg-slate-100 dark:bg-white/5 transition flex items-center justify-center">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block text-amber-400"></i>
            </button>
            <a href="profile.html" class="flex items-center gap-3 border-l pl-4 dark:border-white/10">
                <div class="text-right hidden sm:block">
                    <p class="sidebar-username text-xs font-bold leading-none">User</p>
                    <p class="text-[9px] text-sync font-bold uppercase mt-1">View Profile</p>
                </div>
                <div class="sidebar-avatar w-10 h-10 rounded-xl bg-sync text-white flex items-center justify-center font-black shadow-lg">U</div>
            </a>
        </div>
    </header>

    <div class="flex pt-16 h-screen">
        <!-- SIDEBAR (Matching Dashboard) -->
        <aside id="sidebar" class="w-64 bg-white dark:bg-[#0b1120] border-r border-slate-200 dark:border-white/5 flex flex-col shrink-0">
            <nav class="flex-1 px-4 overflow-y-auto main-scrollbar py-6 space-y-1">
                <p class="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Workspace</p>
                <button onclick="window.location.href='dashboard.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-sync hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                    <i class="fas fa-home"></i> <span>Home</span>
                </button>

                <p class="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 pt-4">Schedule View</p>
                <div class="p-1 bg-slate-100 dark:bg-white/5 rounded-2xl flex flex-col gap-1">
                    <button onclick="window.location.href='dashboard.html'" class="flex items-center gap-3 px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-sync">
                        <i class="fas fa-list"></i> Day Timeline
                    </button>                    
                    <button onclick="window.location.href='dashboard.html'"  class="flex items-center gap-3 px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-sync">
                        <i class="fas fa-calendar-week"></i> Week View
                    </button>
                    <button onclick="window.location.href='dashboard.html'" class="flex items-center gap-3 px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-sync">
                        <i class="fas fa-th-large"></i> Month Grid
                    </button>
                </div>

                <p class="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 pt-4">Actions</p>
                <button onclick="toggleModal('taskModal')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-sync hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                    <i class="fas fa-plus-circle"></i> <span>Add New Task</span>
                </button>
                <button onclick="window.location.href='taskscheduler.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-sync transition-all">
                    <i class="fas fa-tasks"></i> <span>Task Scheduler</span>
                </button>

                <p class="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 pt-4">Insights</p>
                <button onclick="window.location.href='progress.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-sync transition-all">
                    <i class="fas fa-chart-pie"></i> <span>Progress</span>
                </button>
                <button onclick="window.location.href='notes.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold bg-sync/10 text-sync">
                    <i class="fas fa-sticky-note"></i> <span>My Notes</span>
                </button>
                <button onclick="window.location.href='profile.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-sync transition-all">
                    <i class="fas fa-user"></i> <span>Profile</span>
                </button>

                <div class="pt-6">
                    <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-rose-500 hover:bg-rose-500/10 transition-all">
                        <i class="fas fa-power-off"></i> <span>Sign Out</span>
                    </button>
                </div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto main-scrollbar p-6 lg:p-8 space-y-8">
            
            <!-- MOTIVATIONAL QUOTE SECTION -->
            <div id="quote-box" class="w-full p-8 rounded-[2.5rem] bg-gradient-to-br from-study to-study/80 text-white relative overflow-hidden shadow-2xl">
                <div class="relative z-10 max-w-2xl">
                    <i class="fas fa-quote-left text-4xl opacity-20 mb-4 block"></i>
                    <p id="daily-quote" class="text-xl md:text-2xl font-bold italic leading-relaxed">"The secret of getting ahead is getting started."</p>
                    <p id="quote-author" class="mt-4 text-xs font-black uppercase tracking-widest text-sync">— Mark Twain</p>
                </div>
                <i class="fas fa-brain absolute -right-10 -bottom-10 text-[15rem] opacity-5"></i>
            </div>

            <!-- FILTER BAR -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-2 p-1 bg-white dark:bg-[#0b1120] rounded-2xl border border-slate-200 dark:border-white/5 w-fit">
                    <button onclick="filterNotes('all')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-sync text-white shadow-lg">All Notes</button>
                    <button onclick="filterNotes('Study')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-sync">Study</button>
                    <button onclick="filterNotes('Social')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-sync">Social</button>
                    <button onclick="filterNotes('Important')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-sync">Important</button>
                </div>
                <button onclick="openNoteModal()" class="px-6 py-3 bg-sync text-white rounded-2xl font-black text-sm shadow-xl shadow-sync/20 hover:scale-105 transition-all">+ Add Notes</button>
            </div>

            <!-- NOTES GRID -->
            <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Notes injected via JS -->
            </div>
        </main>
    </div>

    <!-- NOTE MODAL -->
    <div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#0b1120] p-8 rounded-[2rem] w-full max-w-lg shadow-2xl relative">
            <button onclick="toggleModal('noteModal')" class="absolute top-6 right-6 text-slate-400"><i class="fas fa-times"></i></button>
            <h3 id="modal-title" class="text-2xl font-black mb-6">Create Note</h3>
            <form id="noteForm" class="space-y-4">
                <input type="hidden" id="note-id">
                <input id="note-title" type="text" placeholder="Title" required class="w-full p-4 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-sync">
                <select id="note-category" class="w-full p-4 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-2xl outline-none">
                    <option value="Study">Study</option>
                    <option value="Personal">Personal</option>
                    <option value="Social">Social</option>
                    <option value="Important">Important</option>
                </select>
                <textarea id="note-content" placeholder="Write your thoughts..." class="w-full p-4 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-sync h-40 resize-none"></textarea>
                <button type="submit" class="w-full py-4 bg-sync text-white rounded-2xl font-black shadow-lg">Save Note</button>
            </form>
        </div>
    </div>

    <script>
        let allNotes = [];
        const quotes = [
            { t: "Success is not final, failure is not fatal: it is the courage to continue that counts.", a: "Winston Churchill" },
            { t: "The only way to do great work is to love what you do.", a: "Steve Jobs" },
            { t: "Education is the most powerful weapon which you can use to change the world.", a: "Nelson Mandela" },
            { t: "Don't let yesterday take up too much of today.", a: "Will Rogers" }
        ];

        async function initNotes(user) {
            populateSidebar(user);
            // Set random quote
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('daily-quote').innerText = `"${q.t}"`;
            document.getElementById('quote-author').innerText = `— ${q.a}`;
            
            await fetchNotes();
        }

        async function fetchNotes() {
            const res = await API.getNotes();
            if (res.success) {
                allNotes = res.data;
                renderNotes(allNotes);
            }
        }

        function renderNotes(notes) {
            const grid = document.getElementById('notes-grid');
            if (notes.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 italic">No notes found. Create your first one!</div>`;
                return;
            }
            grid.innerHTML = notes.map(n => `
                <div class="bg-white dark:bg-[#0b1120] p-6 rounded-3xl border border-slate-200 dark:border-white/5 shadow-sm relative group hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-slate-100 dark:bg-white/5 text-slate-400 border border-slate-200 dark:border-white/10">${n.category}</span>
                        <button onclick="toggleStar(${n.id})" class="text-lg transition-colors ${n.is_starred ? 'text-amber-400' : 'text-slate-300 hover:text-amber-200'}">
                            <i class="fa${n.is_starred ? 's' : 'r'} fa-star"></i>
                        </button>
                    </div>
                    <h4 class="font-bold text-lg mb-2 truncate">${n.title}</h4>
                    <p class="text-xs text-slate-500 mb-4 line-clamp-3 leading-relaxed">${n.content || 'No content'}</p>
                    <div class="flex justify-between items-center pt-4 border-t dark:border-white/5">
                        <span class="text-[10px] text-slate-400 font-bold">${new Date(n.created_at).toLocaleDateString()}</span>
                        <div class="flex gap-2">
                            <button onclick='editNote(${JSON.stringify(n).replace(/'/g, "&apos;")})' class="w-8 h-8 rounded-lg bg-slate-50 dark:bg-white/5 flex items-center justify-center text-sync hover:bg-sync hover:text-white transition-all"><i class="fas fa-pen text-[10px]"></i></button>
                            <button onclick="deleteNote(${n.id})" class="w-8 h-8 rounded-lg bg-rose-50 dark:bg-rose-500/10 flex items-center justify-center text-rose-500 hover:bg-rose-500 hover:text-white transition-all"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterNotes(cat) {
            // Update UI buttons
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-sync";
                if(btn.innerText.includes(cat) || (cat === 'all' && btn.innerText === 'All Notes')) {
                    btn.className = "cat-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-sync text-white shadow-lg";
                }
            });
            const filtered = cat === 'all' ? allNotes : allNotes.filter(n => n.category === cat);
            renderNotes(filtered);
        }

        async function toggleStar(id) {
            await API.starNote(id);
            fetchNotes();
        }

        async function deleteNote(id) {
            if(confirm("Delete this note?")) {
                await API.deleteNote(id);
                fetchNotes();
            }
        }

        function openNoteModal() {
            document.getElementById('note-id').value = '';
            document.getElementById('noteForm').reset();
            document.getElementById('modal-title').innerText = "Create Note";
            toggleModal('noteModal');
        }

        function editNote(note) {
            document.getElementById('note-id').value = note.id;
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-category').value = note.category;
            document.getElementById('note-content').value = note.content;
            document.getElementById('modal-title').innerText = "Edit Note";
            toggleModal('noteModal');
        }

        document.getElementById('noteForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                id: document.getElementById('note-id').value,
                title: document.getElementById('note-title').value,
                category: document.getElementById('note-category').value,
                content: document.getElementById('note-content').value
            };
            const res = await API.saveNote(data);
            if(res.success) {
                toggleModal('noteModal');
                fetchNotes();
            }
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        async function handleLogout() { await API.logout(); window.location.href = "index.html"; }
    </script>
</body>
</html>
