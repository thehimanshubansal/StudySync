<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync | Task Scheduler</title>
    <link rel="icon" type="image/png" href="Image_Folder/Logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { study: '#2F2E80', sync: '#00B4BE' } } }
        }

        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();

        (async () => {
            const user = await requireLogin();
            
            if (user) {
                // Function to start the dashboard
                const startApp = () => {
                    initScheduler(user);
                };

                // If DOM is already loaded, run immediately. Otherwise, wait for it.
                if (document.readyState === "loading") {
                    window.addEventListener('DOMContentLoaded', startApp);
                } else {
                    startApp();
                }
            } else {
                console.error("Auth failed or no user found.");
            }
        })();
    </script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .main-scrollbar::-webkit-scrollbar { width: 4px; }
        .main-scrollbar::-webkit-scrollbar-thumb { background: #00B4BE; border-radius: 10px; }
        #sidebar { transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">

    <!-- TOP NAVBAR (Matching Dashboard) -->
    <header class="h-16 w-full bg-white dark:bg-[#0b1120] border-b border-slate-200 dark:border-white/5 flex items-center justify-between px-6 fixed top-0 z-[60]">
        <div class="flex items-center gap-4">

            </button>
            <div class="flex items-center gap-2">
                <img src="Image_Folder/Logo.png" class="h-8 w-auto">

                    <span class="text-[#2F2E80] dark:text-indigo-400">Study</span><span class="text-[#00B4BE]">Sync</span>

        <div class="flex items-center gap-4">

    <div class="flex pt-16 h-screen">

    <script>
        let allTasks = [];

        async function initScheduler(user) {
            populateSidebar(user);
            await fetchTasks();
        }

        async function fetchTasks() {
            const res = await API.getTasks();
            if (res.success) {
                allTasks = res.data;
                processAndRender();
            }
        }

        function processAndRender() {
            const sortBy = document.getElementById('sortSelect').value;
            const groupBy = document.getElementById('groupSelect').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            // 1. Filter by Search
            let filtered = allTasks.filter(t => 
                t.title.toLowerCase().includes(searchTerm) || 
                t.subject.toLowerCase().includes(searchTerm)
            );

            // 2. Sort
            filtered.sort((a, b) => {
                if (sortBy === 'newest') return b.id - a.id;
                if (sortBy === 'date') return new Date(a.task_date) - new Date(b.task_date);
                if (sortBy === 'priority') {
                    const map = { 'High': 3, 'Medium': 2, 'Low': 1 };
                    return map[b.priority] - map[a.priority];
                }
                if (sortBy === 'subject') return a.subject.localeCompare(b.subject);
                return 0;
            });

            const container = document.getElementById('taskList');
            container.innerHTML = '';

            // 3. Group and Render
            if (groupBy === 'none') {
                renderFlatList(container, filtered);
            } else {
                const groups = filtered.reduce((acc, task) => {
                    const key = task[groupBy] || 'Uncategorized';
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(task);
                    return acc;
                }, {});

                for (const groupName in groups) {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = "space-y-3";
                    groupDiv.innerHTML = `
                        <div class="flex items-center gap-3 px-2">
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">${groupName}</span>
                            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-white/5"></div>
                            <span class="text-[10px] font-bold text-slate-400">${groups[groupName].length} Tasks</span>
                        </div>
                    `;
                    const listDiv = document.createElement('div');
                    listDiv.className = "space-y-3";
                    renderFlatList(listDiv, groups[groupName]);
                    groupDiv.appendChild(listDiv);
                    container.appendChild(groupDiv);
                }
            }
        }

        function renderFlatList(target, tasks) {
            if (tasks.length === 0) {
                target.innerHTML += `<p class="text-center py-10 text-slate-400 text-xs italic">No matching tasks found.</p>`;
                return;
            }
            target.innerHTML += tasks.map(t => generateTaskHTML(t)).join('');
        }

        function generateTaskHTML(t) {
            const isDone = t.status === 'completed';
            const pClass = getPriorityClass(t.priority);
            return `
                <div class="bg-white dark:bg-[#0b1120] p-5 rounded-[1.5rem] border border-slate-200 dark:border-white/5 shadow-sm flex items-center justify-between hover:shadow-md transition group">
                    <div class="flex items-center gap-5">
                        <div class="w-3 h-12 rounded-full" style="background: ${t.color}"></div>
                        <div>
                            <div class="flex items-center gap-3">
                                <h4 class="font-bold text-base ${isDone ? 'line-through opacity-40' : ''}">${t.subject}</h4>
                                <span class="px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-widest bg-slate-100 dark:bg-white/5 ${pClass}">${t.priority}</span>
                            </div>
                            <p class="text-[11px] text-slate-500 mt-0.5 font-medium">
                                <span class="text-sync font-bold">${t.title}</span> • 
                                <i class="far fa-calendar-alt ml-1"></i> ${t.task_date} • 
                                <i class="far fa-clock ml-1"></i> ${t.task_time}
                            </p>
                            ${t.description ? `<p class="text-[10px] text-slate-400 italic mt-1">${t.description}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="toggleTaskStatus(${t.id})" class="p-2.5 rounded-xl bg-slate-50 dark:bg-white/5 hover:text-sync transition">
                            <i class="fas ${isDone ? 'fa-check-circle text-sync' : 'fa-circle-notch'}"></i>
                        </button>
                        <button onclick='openEditModal(${JSON.stringify(t).replace(/'/g, "&apos;")})' class="p-2.5 rounded-xl bg-slate-50 dark:bg-white/5 hover:text-sync transition">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="handleDelete(${t.id})" class="p-2.5 rounded-xl bg-rose-50 dark:bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `;
        }


        // Add this helper to taskscheduler script to handle Priority Colors
        function getPriorityClass(p) {
            if (p === 'High') return 'text-orange-500';
            if (p === 'Low') return 'text-slate-400';
            return 'text-blue-500';
        }
        async function toggleTaskStatus(id) {
            const res = await API.toggleTask(id);
            if(res.success) fetchTasks();
        }

        async function handleDelete(id) {
            if(confirm("Permanently delete this task?")) {
                const res = await API.deleteTask(id);
                if(res.success) {
                    showToast("Task Deleted");
                    fetchTasks();
                }
            }
        }

        
        document.getElementById('taskForm').onsubmit = async (e) => {
            e.preventDefault();

            const data = {
                title: document.getElementById('taskTitle').value,
                subject: document.getElementById('taskSubject').value || 'General',
                description: document.getElementById('taskDesc').value || '',
                category: document.getElementById('taskTitle').value || 'General', // Using Subject as Category for color mapping
                priority: document.getElementById('taskPriority').value,
                task_date: document.getElementById('taskDate').value,
                task_time: document.getElementById('taskClockTime').value || '00:00:00',
                estimated_time: parseInt(document.getElementById('taskEstTime').value) || 60,
                is_urgent: document.getElementById('taskUrgent').checked ? 1 : 0,
                is_important: document.getElementById('taskImportant').checked ? 1 : 0,
                reminder: document.getElementById('taskReminder').checked ? 1 : 0,
                color: document.getElementById('taskColor').value
            };

            const res = await API.createTask(data);
            if(res.success) {
                showToast("Task Created!");
                toggleModal('taskModal');
                await fetchTasks();
                e.target.reset();
            } else {
                showToast(res.message, "error");
            }
        };

        function openEditModal(task) {
            document.getElementById('editTaskId').value = task.id;
            document.getElementById('editTaskSubject').value = task.subject;
            document.getElementById('editTaskTitle').value = task.title;
            document.getElementById('editTaskColor').value = task.color || '#00B4BE';
            document.getElementById('editTaskDesc').value = task.description || '';
            document.getElementById('editTaskPriority').value = task.priority;
            document.getElementById('editTaskEstTime').value = task.estimated_time;
            document.getElementById('editTaskDate').value = task.task_date === '0000-00-00' ? '' : task.task_date;
            document.getElementById('editTaskClockTime').value = task.task_time;
            
            // Checkboxes logic (checking against 1 or '1')
            document.getElementById('editTaskUrgent').checked = parseInt(task.is_urgent) === 1;
            document.getElementById('editTaskImportant').checked = parseInt(task.is_important) === 1;
            document.getElementById('editTaskReminder').checked = parseInt(task.reminder) === 1;

            toggleModal('editModal');
        }

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                id: document.getElementById('editTaskId').value,
                title: document.getElementById('editTaskTitle').value,
                subject: document.getElementById('editTaskSubject').value,
                description: document.getElementById('editTaskDesc').value,
                priority: document.getElementById('editTaskPriority').value,
                task_date: document.getElementById('editTaskDate').value || null, // Allow null
                task_time: document.getElementById('editTaskClockTime').value || '00:00:00',
                estimated_time: document.getElementById('editTaskEstTime').value,
                color: document.getElementById('editTaskColor').value,
                is_urgent: document.getElementById('editTaskUrgent').checked ? 1 : 0,
                is_important: document.getElementById('editTaskImportant').checked ? 1 : 0,
                reminder: document.getElementById('editTaskReminder').checked ? 1 : 0
            };
            
            const res = await API.updateTask(data);
            if(res.success) {
                showToast("Task Updated!");
                toggleModal('editModal');
                fetchTasks(); 
            }
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        async function handleLogout() { await API.logout(); window.location.href = "index.html"; }
    </script>
</body>
</html>
